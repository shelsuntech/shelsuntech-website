<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful gradient from dark blue to bright cyan -->
    <linearGradient id="infinity-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="50%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#6FB1FC" />
    </linearGradient>
    <linearGradient id="pixel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#6FB1FC" />
    </linearGradient>
  </defs>

  <!-- Deep dark background to match the visual identity of the app -->
  <rect width="100%" height="100%" fill="#070A0F" rx="96" />

  <!-- The Infinity Loop -->
  <g transform="translate(0, 0)">
    <!-- Main Left Loop -->
    <path d="M 256,256 
             C 190,170 140,150 90,150 
             C 30,150 20,200 20,256 
             C 20,312 30,362 90,362 
             C 140,362 190,342 256,256 Z" 
          fill="none" stroke="url(#infinity-grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Main Right Loop (starts continuous, then begins to disintegrate) -->
    <path d="M 256,256 
             C 322,170 372,150 422,150 
             C 455,150 472,170 482,200" 
          fill="none" stroke="url(#infinity-grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
          
    <path d="M 482,200 C 490,225 492,256 492,256 C 492,256 492,260 491,265" 
          fill="none" stroke="url(#infinity-grad)" stroke-width="44" stroke-dasharray="10 15 5 10" stroke-linecap="round" />

    <!-- Disintegrating Pixel Particles/Squares on the right side -->
    <!-- Large pieces breaking off -->
    <rect x="420" y="130" width="22" height="22" fill="#6FB1FC" opacity="0.9" rx="3" />
    <rect x="450" y="160" width="18" height="18" fill="#4364F7" opacity="0.85" rx="2" />
    <rect x="475" y="195" width="20" height="20" fill="#6FB1FC" opacity="0.95" rx="3" />
    <rect x="465" y="240" width="16" height="16" fill="#0052D4" opacity="0.75" rx="2" />
    <rect x="480" y="275" width="24" height="24" fill="#6FB1FC" opacity="0.9" rx="4" />
    <rect x="445" y="315" width="18" height="18" fill="#4364F7" opacity="0.85" rx="2" />
    <rect x="410" y="340" width="22" height="22" fill="#6FB1FC" opacity="0.8" rx="3" />
    <rect x="375" y="355" width="16" height="16" fill="#4364F7" opacity="0.65" rx="2" />

    <!-- Medium/Small Pixel particles drifting away -->
    <rect x="480" y="110" width="12" height="12" fill="#6FB1FC" opacity="0.5" />
    <rect x="500" y="160" width="14" height="14" fill="#6FB1FC" opacity="0.7" rx="2" />
    <rect x="510" y="215" width="10" height="10" fill="#4364F7" opacity="0.8" />
    <rect x="495" y="245" width="8" height="8" fill="#6FB1FC" opacity="0.6" />
    <rect x="515" y="280" width="12" height="12" fill="#6FB1FC" opacity="0.75" rx="2" />
    <rect x="485" y="335" width="10" height="10" fill="#4364F7" opacity="0.5" />
    <rect x="460" y="365" width="14" height="14" fill="#6FB1FC" opacity="0.6" rx="2" />
    
    <!-- Fine digital noise pixel points -->
    <rect x="512" y="130" width="6" height="6" fill="#6FB1FC" opacity="0.4" />
    <rect x="490" y="180" width="6" height="6" fill="#4364F7" opacity="0.5" />
    <rect x="520" y="250" width="8" height="8" fill="#6FB1FC" opacity="0.6" />
    <rect x="505" y="310" width="6" height="6" fill="#6FB1FC" opacity="0.5" />
    <rect x="440" y="380" width="8" height="8" fill="#4364F7" opacity="0.4" />
  </g>
</svg>
